<h1>Tarefas</h1>

<a routerLink="/tarefas/cadastrar" class="cadastrar">Cadastrar Tarefa</a>

<span>Qtd tarefas: <span class="quantidade">{{tarefas().length}}</span></span>

<table>
    <thead>
        <th>Descrição</th>
        <th>Prioridade</th>
        <th>Horas estimadas</th>
        <th></th>
    </thead>
    <tbody>
        <!-- 
        for (let i = 0; i < tarefas.length; i++){
            let tarefa = tarefas[i];
        }
        -->
        @for(tarefa of tarefas(); track tarefa.id){

            <tr>
                <td>{{tarefa.descricao}}</td>
                <td>{{tarefa.prioridade}}</td>
                <td>{{tarefa.horasEstimadas}} min</td>
                <td>
                    <a class="editar" routerLink="/tarefas/editar/{{tarefa.id}}">Editar</a>
                    <button class="apagar" (click)="apagar(tarefa.id)">Apagar</button>
                </td>
            </tr>
        }
    </tbody>
</table>

<span>Total estimado: <span class="total">{{totalMinutos()}} min</span></span>
