<h1>Cadastrar Projeto</h1>

<label for="nome">Nome</label>
<input type="text" [(ngModel)]="projeto().nome" 
    id="nome" placeholder="Digite a descrição da projeto">

<label for="codigoprojeto">Código do Projeto</label>
<input type="text" [(ngModel)]="projeto().codigoProjeto" 
    id="codigoprojeto" placeholder="Digite a Código do projeto">

<label for="custo-estimado">Horas estimadas em minutos</label>
<input type="number" [(ngModel)]="projeto().custoEstimado" 
    id="custo-estimado" placeholder="Digite a quantidade de minutos estimados">

@if(projeto().custoEstimado !== null){
    <span>Tempo estimado: {{projeto().custoEstimado}} minuto(s)</span>
}

<button (click)="salvar()">Salvar</button>
